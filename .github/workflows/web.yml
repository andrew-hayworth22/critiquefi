name: Web

# Tests/lints/builds on every push and PR touching web-relevant paths.
# Builds and pushes to GHCR only on push to main. Staging (Coolify on the Pi)
# tracks the resulting images directly. Production images are NOT built here
# — see promote.yml, which copies an already-built GHCR image into ECR by
# digest when a version tag is pushed.

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/web.yml"

permissions:
  contents: read
  packages: write

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Enable corepack
      run: corepack enable

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm --filter web lint

    - name: Check
      run: pnpm --filter web check

    - name: Build
      run: pnpm --filter web build

    - name: Install Playwright browser (for vitest browser mode)
      run: pnpm --filter web exec playwright install --with-deps chromium

    - name: Unit test
      run: pnpm --filter web test:unit -- --run

  # Advisory only — reported but never blocks build-push.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Enable corepack
      run: corepack enable

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build
      run: pnpm --filter web build

    - name: Install Playwright browsers
      run: pnpm --filter web exec playwright install --with-deps

    - name: E2E test
      run: pnpm --filter web test:e2e

  build-push:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/critiquefi-web:latest
            ghcr.io/${{ github.repository_owner }}/critiquefi-web:sha-${{ github.sha }}
