name: API

# Tests/lints on every push and PR touching services/api. Builds and pushes
# to GHCR only on push to main. Staging (Coolify on the Pi) tracks the
# resulting images directly. Production images are NOT built here — see
# promote.yml, which copies an already-built GHCR image into ECR by digest
# when a version tag is pushed.

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/api

      - name: Test
        working-directory: services/api
        run: go test ./...

  build-push:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          push: true
          build-args: |
            VERSION=0.0.1
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/critiquefi-api:latest
            ghcr.io/${{ github.repository_owner }}/critiquefi-api:sha-${{ github.sha }}
